<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cinema News</title>
    <meta
      name="description"
      content="Mobil nyhetsvideo med TV4, SVT Play, Fox News och BBC i en filmisk videovagg."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button" type="button" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="brand-lockup" aria-label="Cinema News">
          <span>CINEMA</span>
          <span>NEWS</span>
        </div>
        <div class="topbar-actions">
          <button class="topbar-icon" type="button" aria-label="Search">&#9906;</button>
          <button id="refreshButton" class="topbar-icon" type="button" aria-label="Hamta senaste videos">&#8635;</button>
        </div>
      </header>

      <main class="mobile-feed">
        <section class="command-bar" aria-label="Uppdatera videoflode">
          <button id="refreshCommand" class="command-button" type="button">Hamta senaste videos</button>
          <p id="refreshMessage" class="sync-banner" hidden></p>
        </section>

        <section id="hero" class="hero"></section>

        <section class="stream-section">
          <div class="section-head">
            <div class="section-title">
              <span class="section-marker section-marker--tv4"></span>
              <h2>TV4 Nyheterna</h2>
            </div>
            <a id="tv4ViewAll" class="section-link" href="#" target="_blank" rel="noreferrer">View all</a>
          </div>
          <div id="tv4Rail" class="content-rail"></div>
        </section>

        <section class="stream-section">
          <div class="section-head">
            <div class="section-title">
              <span class="section-marker section-marker--svt"></span>
              <h2>SVT Play</h2>
            </div>
          </div>
          <div id="svtTabs" class="pill-row"></div>
          <p class="section-caption">Latest from SVT</p>
          <div id="svtRail" class="content-rail"></div>
        </section>

        <section class="stream-section stream-section--fox">
          <div class="section-head">
            <div class="section-title">
              <span class="section-marker section-marker--fox"></span>
              <h2>Fox News Video</h2>
            </div>
          </div>
          <div id="foxFeature"></div>
          <div id="foxRail" class="content-rail content-rail--compact"></div>
        </section>

        <section class="stream-section stream-section--bbc">
          <div class="section-head">
            <div class="section-title">
              <span class="section-marker section-marker--bbc"></span>
              <h2>BBC News</h2>
            </div>
          </div>
          <div id="bbcList" class="bbc-list"></div>
          <a id="bbcViewAll" class="bbc-button" href="#" target="_blank" rel="noreferrer">View all BBC stories</a>
        </section>

        <section class="status-strip">
          <div class="status-item">
            <span>Updated</span>
            <strong id="generatedAt">Waiting</strong>
          </div>
          <div class="status-item">
            <span>Sources</span>
            <strong id="sourceCount">0</strong>
          </div>
          <div class="status-item">
            <span>Videos</span>
            <strong id="videoCount">0</strong>
          </div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="Primary navigation">
        <button class="bottom-nav__item is-active" type="button">
          <span class="bottom-nav__icon">&#8962;</span>
          <span>Home</span>
        </button>
        <button class="bottom-nav__item" type="button">
          <span class="bottom-nav__icon">&#9638;</span>
          <span>Sections</span>
        </button>
        <button class="bottom-nav__item" type="button">
          <span class="bottom-nav__icon">&#9654;</span>
          <span>Live</span>
        </button>
        <button class="bottom-nav__item" type="button">
          <span class="bottom-nav__icon">&#9679;</span>
          <span>Profile</span>
        </button>
      </nav>
    </div>

    <div id="playerModal" class="player-modal" hidden>
      <div class="player-modal__backdrop" data-close-modal="true"></div>
      <div class="player-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="playerTitle">
        <div class="player-modal__top">
          <div>
            <p class="mini-label">Now playing</p>
            <h3 id="playerTitle">Video</h3>
          </div>
          <button id="closePlayer" class="close-button" type="button">Close</button>
        </div>

        <div class="player-modal__frame">
          <iframe
            id="playerFrame"
            title="News video player"
            allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
            allowfullscreen
          ></iframe>
          <video id="playerVideo" controls playsinline hidden></video>
        </div>

        <div class="player-modal__footer">
          <p>Om en video fortfarande blockerar spelning i sidan finns originalkallan alltid har.</p>
          <a id="playerFallback" href="#" target="_blank" rel="noreferrer">Open source</a>
        </div>
      </div>
    </div>
  </body>
</html>
